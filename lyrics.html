<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Lyrics - Emmanuel Suah</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- jsPDF for PDF downloads -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script>
    (function() {
      const style = document.createElement('style');
      style.textContent = `
        #security-overlay {
          position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
          background: rgba(15, 23, 42, 0.95); color: #f8fafc; padding: 16px 32px;
          border-radius: 12px; border: 1px solid #3b82f6; z-index: 100000;
          display: none; pointer-events: none; font-family: system-ui, -apple-system, sans-serif;
          box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); text-align: center;
        }
        #security-overlay.show { display: block; animation: overlay-fade 2s forwards; }
        @keyframes overlay-fade { 0% { opacity: 0; } 15%, 85% { opacity: 1; } 100% { opacity: 0; } }
      `;
      document.head.appendChild(style);
      const div = document.createElement('div');
      div.id = 'security-overlay';
      div.innerHTML = '🛡️ Content Protection: Right-click is disabled';
      const inject = () => document.body ? document.body.appendChild(div) : setTimeout(inject, 50);
      inject();
      const show = () => { div.classList.remove('show'); void div.offsetWidth; div.classList.add('show'); };
      document.addEventListener('contextmenu', e => { e.preventDefault(); show(); });
      document.onkeydown = e => {
        if (e.key == 'F12' || (e.ctrlKey && e.shiftKey && e.key == 'I') || (e.ctrlKey && e.key == 'u')) { e.preventDefault(); show(); }
      };
    })();
  </script>
  <style>
    /* Specific styles for Lyrics Page */
    .lyrics-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
    }
    .lyric-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: var(--shadow-soft);
        position: relative;
        transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .lyric-card:hover {
        transform: translateY(-5px);
        border-color: var(--accent);
    }
    .lyric-header {
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 1rem;
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }
    .lyric-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--accent);
        margin: 0;
    }
    .lyric-artist {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 0.2rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .lyric-content {
        white-space: pre-wrap; /* Preserves line breaks in lyrics */
        font-family: 'Courier New', Courier, monospace;
        line-height: 1.8;
        color: var(--text-main);
        font-size: 1.05rem;
    }
    .lyric-actions {
        display: flex;
        gap: 0.75rem;
    }
    .action-btn {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font-size: 1.1rem;
        opacity: 0.7;
        transition: opacity 0.2s;
    }
    .action-btn:hover {
        opacity: 1;
    }
    /* Form Toggle */
    #add-lyric-section {
        display: none;
        margin-bottom: 3rem;
    }
    #add-lyric-section.show {
        display: block;
    }
    /* For screen-reader accessibility */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
    .lyrics-action-btn {
        margin-top: 1rem;
    }
    .search-container {
        margin-bottom: 2rem;
    }
    .lyrics-status-message {
        text-align: center;
        color: var(--text-muted);
    }
    .lyrics-status-message--error {
        color: var(--error);
    }
    .lyrics-status-message a {
        color: var(--accent-soft);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="main-header">
    <div class="container header-content">
      <div class="logo">
        <a href="index.html"><img src="logo.png" alt="Emmanuel Suah Logo" width="150" height="50"></a>
      </div>
      <nav class="main-nav">
        <ul class="nav-links">
          <li><a href="index.html">Back to Portfolio</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light and dark mode">
          <i class="fa-solid fa-moon"></i>
          <i class="fa-solid fa-sun"></i>
        </button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="lyrics-container">
        <div class="section-header">
            <h2>Song Lyrics Collection</h2>
            <p>A collection of worship songs and hymns.</p>
            <button id="toggle-form-btn" class="btn primary-btn lyrics-action-btn">
                <i class="fa-solid fa-plus"></i> &nbsp; Add New Song
            </button>
        </div>

        <!-- Add Lyric Form -->
        <div id="add-lyric-section" class="contact-form fade-in-section">
            <h3>Add New Song</h3>
            <form id="lyric-form">
                <div class="form-group">
                    <label>Song Title *</label>
                    <input type="text" id="title" required placeholder="e.g. Amazing Grace">
                </div>
                <div class="form-group">
                    <label>Artist / Author</label>
                    <input type="text" id="artist" placeholder="e.g. John Newton">
                </div>
                <div class="form-group">
                    <label>Lyrics *</label>
                    <textarea id="content" rows="10" required placeholder="Paste lyrics here..."></textarea>
                </div>
                <button type="submit" class="btn primary-btn">Save Song</button>
            </form>
        </div>

        <!-- Search Bar -->
        <div class="form-group search-container">
            <label for="search-input" class="sr-only">Search by title</label>
            <input type="search" id="search-input" placeholder="Search songs by title...">
        </div>

        <!-- Lyrics List -->
        <div id="lyrics-list">
            <p class="lyrics-status-message">Loading lyrics...</p>
        </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    const API_URL = 'https://pofolio-ck5d.onrender.com/api/lyrics';
    const listContainer = document.getElementById('lyrics-list');
    const formSection = document.getElementById('add-lyric-section');
    const toggleBtn = document.getElementById('toggle-form-btn');
    const searchInput = document.getElementById('search-input');

    let allLyrics = []; // Cache for all fetched lyrics

    // Load search term from session storage
    const savedSearch = sessionStorage.getItem('lyricsSearch');
    if (savedSearch) searchInput.value = savedSearch;

    // Toggle Form Visibility
    toggleBtn.addEventListener('click', () => {
        formSection.classList.toggle('show');
        toggleBtn.innerHTML = formSection.classList.contains('show')
            ? '<i class="fa-solid fa-minus"></i> &nbsp; Close Form'
            : '<i class="fa-solid fa-plus"></i> &nbsp; Add New Song';
    });

    // Render lyrics based on the current filter
    function renderLyrics() {
        const searchTerm = searchInput.value.toLowerCase();
        // Save to session
        sessionStorage.setItem('lyricsSearch', searchInput.value);

        const filteredLyrics = allLyrics.filter(song =>
            song.title.toLowerCase().includes(searchTerm)
        );

        listContainer.innerHTML = '';

        if (allLyrics.length === 0) {
            listContainer.innerHTML = '<p class="lyrics-status-message">No lyrics found. Add one above!</p>';
            return;
        }

        if (filteredLyrics.length === 0) {
            listContainer.innerHTML = `<p class="lyrics-status-message">No songs found matching "${searchInput.value}".</p>`;
            return;
        }

        filteredLyrics.forEach(song => {
            const card = document.createElement('div');
            card.className = 'lyric-card fade-in-section is-visible';
            card.id = song._id; // Add ID for direct linking
            card.innerHTML = `
                <div class="lyric-header">
                    <div>
                        <h3 class="lyric-title">${song.title}</h3>
                        <div class="lyric-artist">by ${song.artist}</div>
                    </div>
                    <div class="lyric-actions">
                        <button class="action-btn" onclick="copySongLink('${song._id}')" title="Copy Link to Song">
                            <i class="fa-solid fa-share-nodes"></i>
                        </button>
                        <button class="action-btn" onclick="downloadLyric('${song._id}')" title="Download PDF">
                            <i class="fa-solid fa-download"></i>
                        </button>
                    </div>
                </div>
                <div class="lyric-content">${song.content}</div>
            `;
            listContainer.appendChild(card);
        });
    }

    // Fetch all lyrics from the API and store them
    async function loadLyrics() {
        try {
            const res = await fetch(API_URL);
            allLyrics = await res.json();
            renderLyrics(); // Initial render

            // Check for a hash in the URL to scroll to a specific song
            const songId = window.location.hash.substring(1); // This will be the song._id
            if (songId) { 
                const targetSong = document.getElementById(songId);
                if (targetSong) {
                    // Use a timeout to ensure the element is fully rendered and visible
                    setTimeout(() => {
                        targetSong.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        // Add a temporary highlight effect
                        targetSong.style.transition = 'box-shadow 0.3s ease-in-out, transform 0.3s ease-in-out';
                        targetSong.style.boxShadow = '0 0 0 3px var(--accent)';
                        targetSong.style.transform = 'scale(1.01)';
                        setTimeout(() => {
                            targetSong.style.boxShadow = '';
                            targetSong.style.transform = '';
                        }, 2500);
                    }, 100);
                }
            }
        } catch (err) {
            listContainer.innerHTML = '<p class="lyrics-status-message lyrics-status-message--error">Error connecting to backend. Is the server running?</p>';
            console.error(err);
        }
    }

    // Filter lyrics as the user types
    searchInput.addEventListener('input', renderLyrics);

    // Add New Lyric
    document.getElementById('lyric-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value;
        const artist = document.getElementById('artist').value;
        const content = document.getElementById('content').value;

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, artist, content })
            });

            if (res.ok) {
                document.getElementById('lyric-form').reset();
                formSection.classList.remove('show');
                toggleBtn.innerHTML = '<i class="fa-solid fa-plus"></i> &nbsp; Add New Song';
                loadLyrics(); // Refresh list
            }
        } catch (err) {
            alert('Failed to save lyric');
        }
    });

    // Share Link Functionality
    function copySongLink(id) {
        const url = window.location.origin + window.location.pathname + '#' + id;
        navigator.clipboard.writeText(url).then(() => {
            alert('Link copied to clipboard! You can now share this specific song.');
        }).catch(err => {
            console.error('Could not copy text: ', err);
        });
    }

    // Download Lyric
    function downloadLyric(id) {
        // Ensure jsPDF is loaded from the CDN
        if (typeof window.jspdf === 'undefined') {
            alert('PDF library is still loading. Please try again in a moment.');
            return;
        }

        const { jsPDF } = window.jspdf;
        const song = allLyrics.find(s => s._id === id);
        if (!song) return;

        const doc = new jsPDF();
        const pageHeight = doc.internal.pageSize.getHeight();
        const pageWidth = doc.internal.pageSize.getWidth();
        const margin = 15;
        let y = margin + 15; // Initial y position for content

        // --- Reusable Header Function ---
        const addHeader = () => {
            // --- Add Watermark ---
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(72);
            doc.setTextColor(235); // A very light gray for the watermark
            // Rotate and place text in the center.
            doc.text("suahco4.online", pageWidth / 2, pageHeight / 2, {
                angle: -45,
                align: 'center'
            });

            // --- Add Header Content (this resets styles for the header) ---
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(9);
            doc.setTextColor(150);
            doc.text("Emmanuel Suah's Lyric Collection", margin, margin);
            doc.line(margin, margin + 2, pageWidth - margin, margin + 2); // Underline
        };

        // --- Reusable Footer Function ---
        const addFooter = () => {
            const pageCount = doc.internal.getNumberOfPages();
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(9);
            doc.setTextColor(150);
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                const footerText = `Page ${i} of ${pageCount} | suahco4.online`;
                const textWidth = doc.getStringUnitWidth(footerText) * doc.internal.getFontSize() / doc.internal.scaleFactor;
                doc.text(footerText, (pageWidth - textWidth) / 2, pageHeight - 10);
            }
        };

        // --- Add content to the first page ---
        addHeader();

        // Set Title
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(20);
        doc.setTextColor(0);
        doc.text(song.title, margin, y);
        y += 10;

        // Set Artist
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(14);
        doc.setTextColor(100); // Gray color
        doc.text(`By ${song.artist}`, margin, y);
        y += 15;

        // Set Lyric Content
        doc.setFont('times', 'normal');
        doc.setFontSize(12);
        doc.setTextColor(0); // Black color
        const splitContent = doc.splitTextToSize(song.content, pageWidth - (margin * 2));

        // Loop through lines and add pages if needed
        splitContent.forEach(line => {
            // Check if content will overflow before printing
            if (y > pageHeight - margin) {
                doc.addPage();
                addHeader();
                y = margin + 15; // Reset y for new page
                doc.setTextColor(0); // Reset text color to black for the content
            }
            doc.text(line, margin, y);
            y += 7; // Line height for font size 12
        });

        // Add footers to all pages after content is rendered
        addFooter();

        const fileName = `${song.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.pdf`;
        doc.save(fileName);
    }

    // Initial Load
    loadLyrics();
  </script>
</body>
</html>
