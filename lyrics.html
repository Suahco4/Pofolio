<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Lyrics - Emmanuel Suah</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    /* Specific styles for Lyrics Page */
    .lyrics-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
    }
    .lyric-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 1rem;
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: var(--shadow-soft);
        position: relative;
    }
    .lyric-header {
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 1rem;
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }
    .lyric-title {
        font-size: 1.5rem;
        color: var(--accent);
        margin: 0;
    }
    .lyric-artist {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 0.2rem;
    }
    .lyric-content {
        white-space: pre-wrap; /* Preserves line breaks in lyrics */
        font-family: 'Courier New', Courier, monospace;
        line-height: 1.8;
        color: var(--text-main);
    }
    .delete-btn {
        background: none;
        border: none;
        color: var(--error);
        cursor: pointer;
        font-size: 1.1rem;
        opacity: 0.7;
        transition: opacity 0.2s;
    }
    .delete-btn:hover {
        opacity: 1;
    }
    /* Form Toggle */
    #add-lyric-section {
        display: none;
        margin-bottom: 3rem;
    }
    #add-lyric-section.show {
        display: block;
    }
    /* For screen-reader accessibility */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
    .lyrics-action-btn {
        margin-top: 1rem;
    }
    .search-container {
        margin-bottom: 2rem;
    }
    .lyrics-status-message {
        text-align: center;
        color: var(--text-muted);
    }
    .lyrics-status-message--error {
        color: var(--error);
    }
    .lyrics-status-message a {
        color: var(--accent-soft);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="main-header">
    <div class="container header-content">
      <div class="logo">
        <a href="index.html"><img src="logo.png" alt="Emmanuel Suah Logo" width="150" height="50"></a>
      </div>
      <nav class="main-nav">
        <ul class="nav-links">
          <li><a href="index.html">Back to Portfolio</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light and dark mode">
          <i class="fa-solid fa-moon"></i>
          <i class="fa-solid fa-sun"></i>
        </button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="lyrics-container">
        <div class="section-header">
            <h2>Song Lyrics Collection</h2>
            <p>A collection of worship songs and hymns.</p>
            <button id="toggle-form-btn" class="btn primary-btn lyrics-action-btn">
                <i class="fa-solid fa-plus"></i> &nbsp; Add New Song
            </button>
        </div>

        <!-- Add Lyric Form -->
        <div id="add-lyric-section" class="contact-form fade-in-section">
            <h3>Add New Song</h3>
            <form id="lyric-form">
                <div class="form-group">
                    <label>Song Title *</label>
                    <input type="text" id="title" required placeholder="e.g. Amazing Grace">
                </div>
                <div class="form-group">
                    <label>Artist / Author</label>
                    <input type="text" id="artist" placeholder="e.g. John Newton">
                </div>
                <div class="form-group">
                    <label>Lyrics *</label>
                    <textarea id="content" rows="10" required placeholder="Paste lyrics here..."></textarea>
                </div>
                <button type="submit" class="btn primary-btn">Save Song</button>
            </form>
        </div>

        <!-- Search Bar -->
        <div class="form-group search-container">
            <label for="search-input" class="sr-only">Search by title</label>
            <input type="search" id="search-input" placeholder="Search songs by title...">
        </div>

        <!-- Lyrics List -->
        <div id="lyrics-list">
            <p class="lyrics-status-message">Loading lyrics...</p>
        </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    const API_URL = 'https://pofolio-ck5d.onrender.com/api/lyrics';
    const listContainer = document.getElementById('lyrics-list');
    const formSection = document.getElementById('add-lyric-section');
    const toggleBtn = document.getElementById('toggle-form-btn');
    const searchInput = document.getElementById('search-input');

    let allLyrics = []; // Cache for all fetched lyrics

    // Toggle Form Visibility
    toggleBtn.addEventListener('click', () => {
        formSection.classList.toggle('show');
        toggleBtn.innerHTML = formSection.classList.contains('show')
            ? '<i class="fa-solid fa-minus"></i> &nbsp; Close Form'
            : '<i class="fa-solid fa-plus"></i> &nbsp; Add New Song';
    });

    // Render lyrics based on the current filter
    function renderLyrics() {
        const searchTerm = searchInput.value.toLowerCase();
        const filteredLyrics = allLyrics.filter(song =>
            song.title.toLowerCase().includes(searchTerm)
        );

        listContainer.innerHTML = '';

        if (allLyrics.length === 0) {
            listContainer.innerHTML = '<p class="lyrics-status-message">No lyrics found. Add one above!</p>';
            return;
        }

        if (filteredLyrics.length === 0) {
            listContainer.innerHTML = `<p class="lyrics-status-message">No songs found matching "${searchInput.value}".</p>`;
            return;
        }

        filteredLyrics.forEach(song => {
            const card = document.createElement('div');
            card.className = 'lyric-card fade-in-section is-visible';
            card.id = song._id; // Add ID for direct linking
            card.innerHTML = `
                <div class="lyric-header">
                    <div>
                        <h3 class="lyric-title">${song.title}</h3>
                        <div class="lyric-artist">by ${song.artist}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteLyric('${song._id}')" title="Delete Song">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                <div class="lyric-content">${song.content}</div>
            `;
            listContainer.appendChild(card);
        });
    }

    // Fetch all lyrics from the API and store them
    async function loadLyrics() {
        try {
            const res = await fetch(API_URL);
            allLyrics = await res.json();
            renderLyrics(); // Initial render

            // Check for a hash in the URL to scroll to a specific song
            const songId = window.location.hash.substring(1); // This will be the song._id
            if (songId) { 
                const targetSong = document.getElementById(songId);
                if (targetSong) {
                    // Use a timeout to ensure the element is fully rendered and visible
                    setTimeout(() => {
                        targetSong.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        // Add a temporary highlight effect
                        targetSong.style.transition = 'box-shadow 0.3s ease-in-out, transform 0.3s ease-in-out';
                        targetSong.style.boxShadow = '0 0 0 3px var(--accent)';
                        targetSong.style.transform = 'scale(1.01)';
                        setTimeout(() => {
                            targetSong.style.boxShadow = '';
                            targetSong.style.transform = '';
                        }, 2500);
                    }, 100);
                }
            }
        } catch (err) {
            listContainer.innerHTML = '<p class="lyrics-status-message lyrics-status-message--error">Error connecting to backend. Is the server running?</p>';
            console.error(err);
        }
    }

    // Filter lyrics as the user types
    searchInput.addEventListener('input', renderLyrics);

    // Add New Lyric
    document.getElementById('lyric-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value;
        const artist = document.getElementById('artist').value;
        const content = document.getElementById('content').value;

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, artist, content })
            });

            if (res.ok) {
                document.getElementById('lyric-form').reset();
                formSection.classList.remove('show');
                toggleBtn.innerHTML = '<i class="fa-solid fa-plus"></i> &nbsp; Add New Song';
                loadLyrics(); // Refresh list
            }
        } catch (err) {
            alert('Failed to save lyric');
        }
    });

    // Delete Lyric
    async function deleteLyric(id) {
        if (!confirm('Are you sure you want to delete this song?')) return;
        
        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadLyrics();
        } catch (err) {
            alert('Failed to delete');
        }
    }

    // Initial Load
    loadLyrics();
  </script>
</body>
</html>
